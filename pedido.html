<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pedido — ProOliva Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#20281a; --olive:#55643b; --olive-deep:#3a4527; --olive-light:#8a9a66;
    --gold:#c89b3c; --gold-deep:#9c7326; --linen:#f3eee0; --paper:#fbf9f2; --line:rgba(32,40,26,0.14);
    --danger:#a3392f;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html{ background:var(--linen); -webkit-text-size-adjust:100%; text-size-adjust:100%;}
  body{ font-family:'Public Sans', sans-serif; background:var(--linen); color:var(--ink); line-height:1.5; -webkit-font-smoothing:antialiased;}
  h1,h2,h3{ font-family:'Archivo', sans-serif; font-weight:700; color:var(--ink);}
  a{ color:inherit; }
  button, input, select, textarea{ font-family:'Public Sans', sans-serif; }

  .admin-header{ background:var(--ink); color:var(--paper); padding:16px 0; padding-top:calc(16px + env(safe-area-inset-top));}
  .admin-header .wrap{ max-width:1000px; margin:0 auto; padding:0 28px; display:flex; align-items:center; justify-content:space-between;}
  .admin-header .brand{ display:flex; align-items:center; gap:10px; font-family:'Archivo',sans-serif; font-weight:700; font-size:16px;}
  .admin-header .brand img{ height:30px;}
  .back-link{ font-size:13.5px; font-weight:600; display:flex; align-items:center; gap:6px; opacity:0.85;}
  .back-link:hover{ opacity:1;}

  .admin-body{ max-width:1000px; margin:0 auto; padding:32px 28px 80px;}

  .order-hero{ display:flex; align-items:flex-start; justify-content:space-between; gap:20px; flex-wrap:wrap; margin-bottom:28px;}
  .order-hero h1{ font-size:26px; margin-bottom:6px;}
  .order-hero .meta{ font-size:13px; opacity:0.6;}
  .badge{ display:inline-block; padding:4px 12px; border-radius:20px; font-size:11.5px; font-weight:600; margin-right:6px;}
  .badge-on{ background:#e4ede0; color:var(--olive-deep);}
  .badge-off{ background:var(--line); color:var(--ink); opacity:0.65;}
  .badge-source{ background:var(--linen); border:1px solid var(--line); color:var(--ink); opacity:0.75;}

  .grid{ display:grid; grid-template-columns:1.3fr 1fr; gap:24px; align-items:start;}
  .panel{ background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:26px 28px; margin-bottom:20px;}
  .panel h2{ font-size:15px; text-transform:uppercase; letter-spacing:0.04em; color:var(--gold-deep); font-family:'IBM Plex Mono',monospace; font-weight:600; margin-bottom:18px;}

  .info-row{ display:flex; justify-content:space-between; gap:16px; padding:9px 0; border-bottom:1px solid var(--line); font-size:13.5px;}
  .info-row:last-child{ border-bottom:none;}
  .info-row span:first-child{ opacity:0.6;}
  .info-row span:last-child{ font-weight:600; text-align:right;}

  .items-table{ width:100%; border-collapse:collapse; font-size:13.5px; margin-bottom:6px;}
  .items-table td{ padding:8px 0; border-bottom:1px solid var(--line);}
  .items-table tr:last-child td{ border-bottom:none;}
  .items-table td:last-child{ text-align:right; font-weight:600;}
  .notes-box{ background:var(--linen); border-radius:8px; padding:14px 16px; font-size:13.5px; white-space:pre-wrap;}

  .field{ margin-bottom:16px;}
  .field:last-child{ margin-bottom:0;}
  .field label{ display:block; font-size:12.5px; font-weight:600; margin-bottom:6px; color:var(--olive-deep);}
  .field input, .field select{ width:100%; border:1.5px solid var(--line); border-radius:6px; padding:10px 12px; font-size:16px; background:#fff; color:var(--ink); outline:none;}
  .field input:focus, .field select:focus{ border-color:var(--olive-deep);}
  .field-check{ display:flex; align-items:center; gap:10px; font-size:14px; font-weight:600; padding:11px 0;}
  .field-check input{ width:18px; height:18px;}
  .field-hint{ font-size:11.5px; opacity:0.55; margin-top:5px;}

  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:12px 20px; border-radius:6px; font-size:13.5px; font-weight:700; letter-spacing:0.02em; cursor:pointer; border:1px solid transparent; width:100%; transition:transform .15s, background .15s, opacity .15s;}
  .btn:hover{ transform:translateY(-1px);}
  .btn:disabled{ opacity:0.45; cursor:not-allowed; transform:none;}
  .btn-primary{ background:var(--olive-deep); color:var(--paper);}
  .btn-primary:hover{ background:var(--ink);}
  .btn-outline{ background:transparent; border-color:var(--line); color:var(--ink);}
  .btn-outline:hover{ border-color:var(--olive-deep);}
  .btn-danger{ background:transparent; border-color:var(--danger); color:var(--danger); font-size:12.5px; padding:9px 14px; width:auto;}
  .error-msg{ background:#fbe9e7; border:1px solid var(--danger); color:var(--danger); font-size:12.5px; padding:10px 12px; border-radius:6px;}
  .btn-danger:hover{ background:var(--danger); color:#fff;}

  .save-toast{ font-size:12px; color:var(--olive-deep); font-weight:600; margin-top:8px; opacity:0; transition:opacity .3s;}
  .save-toast.show{ opacity:1;}

  .loading-state, .error-state{ text-align:center; padding:80px 20px; opacity:0.65;}

  @media (max-width:800px){
    .grid{ grid-template-columns:1fr;}
    .admin-header .wrap, .admin-body{ padding-left:16px; padding-right:16px;}
    .order-hero{ flex-direction:column; align-items:flex-start;}
  }
</style>
</head>
<body>

<div class="admin-header">
  <div class="wrap">
    <div class="brand"><img src="logo.png" alt="ProOlivas Chile"> Panel de administración</div>
    <a class="back-link" href="admin.html#pedidos">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#fbf9f2" stroke-width="2" stroke-linecap="round"/></svg>
      Volver a Pedidos
    </a>
  </div>
</div>

<div class="admin-body" id="adminBody">
  <div class="loading-state" id="loadingState">Cargando pedido...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  const SEND_CONFIRMATION_FN = 'send-order-confirmation';
  const NOTIFY_SHIPMENT_FN = 'notify-shipment';

  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('id');
  let order = null;

  const SHIPPING_LABELS = { chilexpress: 'Chilexpress', local: 'Envío local' };

  function formatCLP(value){
    return new Intl.NumberFormat('es-CL', { style:'currency', currency:'CLP', maximumFractionDigits:0 }).format(value || 0);
  }
  function formatDate(value, withTime){
    if (!value) return '—';
    return new Date(value).toLocaleString('es-CL', withTime
      ? { day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' }
      : { day:'numeric', month:'long', year:'numeric' });
  }

  async function callEdgeFunction(name, body){
    const res = await fetch(`${SUPABASE_URL}/functions/v1/${name}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'apikey': SUPABASE_ANON_KEY
      },
      body: JSON.stringify(body)
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.error){
      throw new Error(data.error || `No se pudo llamar a ${name}.`);
    }
    return data;
  }

  async function init(){
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session){
      window.location.href = 'admin.html';
      return;
    }
    if (!orderId){
      renderError('Falta el ID del pedido en la URL.');
      return;
    }
    await loadOrder();
  }

  async function loadOrder(){
    const { data, error } = await supabaseClient.from('orders').select('*').eq('id', orderId).single();
    if (error || !data){
      renderError('No se encontró este pedido. Puede que haya sido borrado.');
      return;
    }
    order = data;
    render();
  }

  function renderError(msg){
    document.getElementById('adminBody').innerHTML = `<div class="error-state"><h2 style="margin-bottom:10px;">${msg}</h2><a href="admin.html#pedidos" class="btn btn-outline" style="width:auto; display:inline-flex;">Volver a Pedidos</a></div>`;
  }

  function itemsHtml(o){
    if (Array.isArray(o.items) && o.items.length > 0){
      return `<table class="items-table">${o.items.map(i => `<tr><td>${i.qty}x ${i.name}</td><td>${formatCLP(i.price * i.qty)}</td></tr>`).join('')}</table>`;
    }
    if (o.notes){
      return `<div class="notes-box">${o.notes}</div>`;
    }
    return '<p style="opacity:0.6; font-size:13.5px;">Sin detalle de items.</p>';
  }

  function estadoLabel(o){
    if (o.delivered) return { text: 'Entregado', cls: 'badge-on' };
    if (o.shipped_notified_at) return { text: 'Despachado', cls: '', style: 'background:#f3e6c9; color:#9c7326;' };
    if (o.ready) return { text: 'Preparado', cls: '', style: 'background:#e0e6d6; color:#55643b;' };
    return { text: 'Por preparar', cls: 'badge-off' };
  }

  function render(){
    const o = order;
    const estado = estadoLabel(o);

    document.getElementById('adminBody').innerHTML = `
      <div class="order-hero">
        <div>
          <h1>Pedido ${o.buy_order || o.id}</h1>
          <div class="meta">Creado el ${formatDate(o.created_at, true)}</div>
        </div>
        <div>
          <span class="badge ${o.paid ? 'badge-on' : 'badge-off'}">${o.paid ? 'Pagado' : 'Pendiente de pago'}</span>
          <span class="badge ${estado.cls}" ${estado.style ? `style="${estado.style}"` : ''}>${estado.text}</span>
          <span class="badge badge-source">${o.source === 'manual' ? 'Manual · WhatsApp/llamada' : 'Pagado en la web'}</span>
        </div>
      </div>

      <div class="grid">
        <div>
          <div class="panel">
            <h2>Cliente y destino</h2>
            <div class="info-row"><span>Nombre</span><span>${o.customer_name || '—'}</span></div>
            <div class="info-row"><span>Correo</span><span>${o.customer_email || '—'}</span></div>
            <div class="info-row"><span>Teléfono</span><span>${o.customer_phone || '—'}</span></div>
            <div class="info-row"><span>Dirección</span><span>${o.shipping_address || '—'}</span></div>
            <div class="info-row"><span>Comuna / Región</span><span>${[o.shipping_comuna, o.shipping_region].filter(Boolean).join(' / ') || '—'}</span></div>
          </div>

          <div class="panel">
            <h2>Detalle del pedido</h2>
            ${itemsHtml(o)}
            <div style="margin-top:14px;">
              <div class="info-row"><span>Subtotal</span><span>${formatCLP(o.subtotal)}</span></div>
              <div class="info-row"><span>Envío</span><span>${formatCLP(o.shipping_cost)}</span></div>
              <div class="info-row"><span>Total</span><span style="font-family:'Archivo',sans-serif; font-size:16px; color:var(--olive-deep);">${formatCLP(o.total)}</span></div>
            </div>
          </div>

          <div class="panel">
            <h2>Datos del pago (Webpay)</h2>
            <div class="info-row"><span>N° de orden (buy_order)</span><span>${o.buy_order || '—'}</span></div>
            <div class="info-row"><span>Estado Webpay</span><span>${o.status || '—'}</span></div>
            <div class="info-row"><span>Sesión</span><span>${o.session_id || '—'}</span></div>
          </div>

          <div class="panel">
            <h2>Documento tributario</h2>
            <div class="info-row"><span>Tipo</span><span>${o.document_type === 'factura' ? 'Factura' : 'Boleta'}</span></div>
            ${o.document_type === 'factura' ? `
              <div class="info-row"><span>RUT empresa</span><span>${o.billing_rut || '—'}</span></div>
              <div class="info-row"><span>Razón social</span><span>${o.billing_business_name || '—'}</span></div>
              <div class="info-row"><span>Giro</span><span>${o.billing_giro || '—'}</span></div>
            ` : ''}
            ${o.sii_folio ? `
              <div class="info-row"><span>Folio SII</span><span>${o.sii_folio}</span></div>
              <div class="info-row"><span>Emitido</span><span>${formatDate(o.sii_emitted_at, true)}</span></div>
            ` : ''}
            <button class="btn btn-outline" id="emitDocumentBtn" style="margin-top:14px;">
              ${o.sii_folio ? 'Volver a emitir' : 'Emitir boleta/factura'}
            </button>
            ${o.sii_document_url ? `<a href="${o.sii_document_url}" target="_blank" rel="noopener" class="btn btn-primary" style="margin-top:10px;">Ver PDF</a>` : ''}
            <div class="error-msg" id="emitDocumentError" style="display:none; margin-top:10px;"></div>
          </div>
        </div>

        <div>
          <div class="panel">
            <h2>Gestión del pedido</h2>

            <label class="field-check">
              <input type="checkbox" id="fieldPaid" ${o.paid ? 'checked' : ''}>
              Pagado
            </label>
            <label class="field-check">
              <input type="checkbox" id="fieldReady" ${o.ready ? 'checked' : ''}>
              Preparado (listo para despachar)
            </label>

            <div class="field" style="margin-top:6px;">
              <label>Método de envío</label>
              <select id="fieldShippingMethod">
                <option value="" ${!o.shipping_method ? 'selected' : ''}>Sin definir</option>
                <option value="chilexpress" ${o.shipping_method === 'chilexpress' ? 'selected' : ''}>Chilexpress</option>
                <option value="local" ${o.shipping_method === 'local' ? 'selected' : ''}>Envío local</option>
              </select>
            </div>

            <div class="field">
              <label>N° de seguimiento</label>
              <input type="text" id="fieldTracking" value="${(o.tracking_number || '').replace(/"/g,'&quot;')}" placeholder="Ej: 123456789CL">
            </div>

            <button class="btn btn-outline" id="saveTrackingBtn" style="margin-bottom:10px;">Guardar cambios</button>
            <div class="save-toast" id="saveToast">Guardado ✓</div>

            <button class="btn btn-primary" id="notifyBtn" style="margin-top:14px;">
              ${o.shipped_notified_at ? 'Reenviar aviso de envío' : 'Notificar envío al cliente'}
            </button>
            ${o.shipped_notified_at ? `<div class="field-hint" style="text-align:center; margin-top:8px;">Último aviso enviado: ${formatDate(o.shipped_notified_at, true)}</div>` : `<div class="field-hint" style="text-align:center; margin-top:8px;">Necesitas método de envío y N° de seguimiento guardados primero.</div>`}

            <label class="field-check" style="margin-top:18px; border-top:1px solid var(--line); padding-top:16px;">
              <input type="checkbox" id="fieldDelivered" ${o.delivered ? 'checked' : ''}>
              Entregado ${o.delivered_at ? `<span style="font-weight:400; opacity:0.6; font-size:12px; margin-left:6px;">(${formatDate(o.delivered_at)})</span>` : ''}
            </label>
          </div>

          <div class="panel" style="text-align:center;">
            <button class="btn btn-danger" id="deleteBtn">Borrar este pedido</button>
          </div>
        </div>
      </div>
    `;

    wireEvents();
  }

  function showToast(){
    const toast = document.getElementById('saveToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function wireEvents(){
    document.getElementById('fieldPaid').addEventListener('change', (e) => quickUpdate({ paid: e.target.checked }));
    document.getElementById('fieldReady').addEventListener('change', (e) => quickUpdate({ ready: e.target.checked }));
    document.getElementById('fieldDelivered').addEventListener('change', (e) => quickUpdate({
      delivered: e.target.checked,
      delivered_at: e.target.checked ? new Date().toISOString() : null
    }));

    document.getElementById('saveTrackingBtn').addEventListener('click', async () => {
      const shipping_method = document.getElementById('fieldShippingMethod').value || null;
      const tracking_number = document.getElementById('fieldTracking').value.trim() || null;
      await quickUpdate({ shipping_method, tracking_number }, true);
    });

    document.getElementById('notifyBtn').addEventListener('click', notifyShipment);
    document.getElementById('deleteBtn').addEventListener('click', deleteOrder);
    document.getElementById('emitDocumentBtn').addEventListener('click', emitDocument);
  }

  async function emitDocument(){
    const label = order.document_type === 'factura' ? 'la factura' : 'la boleta';
    if (!confirm(`¿Emitir ${label} de este pedido en OpenFactura?`)) return;

    const btn = document.getElementById('emitDocumentBtn');
    const errorEl = document.getElementById('emitDocumentError');
    errorEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Emitiendo...';

    try {
      const data = await callEdgeFunction('emit-document', { orderId });
      if (data.error) throw new Error(data.error);
      await loadOrder();
    } catch (err){
      errorEl.textContent = 'No se pudo emitir el documento: ' + err.message;
      errorEl.style.display = 'block';
      console.error(err);
      btn.disabled = false;
      btn.textContent = order.sii_folio ? 'Volver a emitir' : 'Emitir boleta/factura';
    }
  }

  async function quickUpdate(payload, skipReload){
    const { error } = await supabaseClient.from('orders').update(payload).eq('id', orderId);
    if (error){
      alert('No se pudo guardar el cambio: ' + error.message);
      console.error(error);
      return;
    }
    order = { ...order, ...payload };
    showToast();
    if (!skipReload){
      render();
    } else {
      // refresca solo lo necesario para mostrar el estado de "Despachado" al vuelo
      render();
    }
  }

  async function notifyShipment(){
    if (!order.tracking_number || !order.shipping_method){
      alert('Primero guarda el método de envío y el N° de seguimiento.');
      return;
    }
    if (!order.customer_email){
      alert('Este pedido no tiene correo de cliente, no se puede notificar por email.');
      return;
    }
    if (!confirm(`¿Enviar a ${order.customer_email} el aviso de envío con el N° ${order.tracking_number}?`)) return;

    const btn = document.getElementById('notifyBtn');
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    try {
      await callEdgeFunction(NOTIFY_SHIPMENT_FN, { orderId });
      await loadOrder();
    } catch (err){
      alert('No se pudo enviar la notificación: ' + err.message + ' — revisa que la función "' + NOTIFY_SHIPMENT_FN + '" esté desplegada en Supabase.');
      console.error(err);
      render();
    }
  }

  async function deleteOrder(){
    if (!confirm('¿Borrar este pedido? Esta acción no se puede deshacer.')) return;
    const { error } = await supabaseClient.from('orders').delete().eq('id', orderId);
    if (error){
      alert('No se pudo borrar el pedido.');
      console.error(error);
      return;
    }
    window.location.href = 'admin.html#pedidos';
  }

  init();
</script>

</body>
</html>
