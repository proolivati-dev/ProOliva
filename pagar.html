<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Redirigiendo a Webpay — ProOliva</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html{ background:#f3eee0;}
  body{
    font-family:'Public Sans', Arial, sans-serif; background:#f3eee0; color:#20281a;
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    background:#fbf9f2; border-radius:14px; padding:44px 36px; text-align:center;
    max-width:380px; width:100%; box-shadow:0 24px 50px -24px rgba(32,40,26,0.3);
  }
  .spinner{
    width:36px; height:36px; border:3px solid #e4ede0; border-top-color:#3a4527;
    border-radius:50%; margin:0 auto 22px; animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg);} }
  h1{ font-family:'Archivo', sans-serif; font-size:17px; margin-bottom:8px;}
  p{ font-size:13.5px; opacity:0.7; line-height:1.5;}
  a.btn{
    display:inline-block; margin-top:18px; background:#3a4527; color:#fbf9f2;
    padding:12px 22px; border-radius:6px; text-decoration:none; font-weight:700; font-size:13px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="statusTitle">Conectando con Webpay...</h1>
    <p id="statusText">No cierres esta ventana, en un momento más te llevamos a pagar.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const url = params.get('url');

    if (token && url) {
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = url;
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'token_ws';
      input.value = token;
      form.appendChild(input);
      document.body.appendChild(form);
      form.submit();
    } else {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('statusTitle').textContent = 'Este link de pago no es válido';
      document.getElementById('statusText').innerHTML = 'Puede que ya haya sido usado o haya expirado.<br>Escríbenos por WhatsApp para que te generen uno nuevo.<br><a class="btn" href="https://wa.me/56988256980" target="_blank" rel="noopener">Escribir por WhatsApp</a>';
    }
  </script>
</body>
</html>
